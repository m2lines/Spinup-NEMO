name: Formatting
on: [push, pull_request]

jobs:
  formatting:
    runs-on: ubuntu-latest
    name: Code Formatting and Trailing Whitespace Check
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run Ruff for code formatting check
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check"

      - name: Install yamlfmt
        run: |
          mkdir -p ~/bin
          curl -sSLo ~/bin/yamlfmt https://github.com/google/yamlfmt/releases/latest/download/yamlfmt-linux-amd64
          chmod +x ~/bin/yamlfmt
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Run yamlfmt check
        run: |
          yamlfmt -d .  # The `-d` flag checks formatting without making changes
